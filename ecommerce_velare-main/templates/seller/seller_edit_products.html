<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Veláre - Edit Product</title>
	<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/Velare Logo Tab 1.png') }}">
	<!-- Google Fonts for aesthetic, expensive look -->
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@100;300;400;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Goodie&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/accounts/myAccount_profile.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/seller/seller_edit_products.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/logout-modal.css') }}">
	<!-- Bootstrap Icons CDN -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
	<div class="header-container">
		<span class="header"><a href="{{ url_for('seller_dashboard.seller_dashboard') }}" style="color: inherit; text-decoration: none;">Veláre</a></span>
	</div>
	<hr class="divider">

	<div class="main-content-container centered">
		<div class="account-card-container" id="accountCardContainer">
			<div class="account-card-bg">
				<h2 class="profile-section-title">Edit Product</h2>
				<hr class="profile-section-divider">
				
				<div class="profile-content-row">
					<form class="add-product-form" id="editProductForm">
						<div class="form-group">
							<label for="editProductName">Product Name</label>
							<input type="text" id="editProductName" name="editProductName" placeholder="Enter product name" value="Sample Product Name" required>
						</div>
						
						<div class="form-group">
							<label for="editProductCategory">Category</label>
							<select id="editProductCategory" name="editProductCategory" required>
								<option value="">Select Category</option>
								<option value="dresses" selected>Dresses</option>
								<option value="skirts">Skirts</option>
								<option value="tops">Tops</option>
								<option value="blouses">Blouses</option>
								<option value="activewear">Activewear</option>
								<option value="yoga-pants">Yoga Pants</option>
								<option value="lingerie">Lingerie</option>
								<option value="sleepwear">Sleepwear</option>
								<option value="jackets">Jackets</option>
								<option value="coats">Coats</option>
								<option value="shoes">Shoes</option>
								<option value="accessories">Accessories</option>
							</select>
						</div>
						
						<div class="form-group">
							<label for="editProductPrice">Price (₱)</label>
							<input type="number" id="editProductPrice" name="editProductPrice" placeholder="0.00" step="0.01" min="0" value="2500.00" required>
						</div>
						
						<div class="form-group">
							<label for="editProductStock">Stock Quantity</label>
							<input type="number" id="editProductStock" name="editProductStock" placeholder="0" min="0" value="15" required>
						</div>
						
						<div class="form-group">
							<label title="Sustainable Development Goals">SDG</label>
							<div class="checkbox-group">
								<label class="checkbox-label">
									<input type="checkbox" id="editProductHandmade" name="editProductHandmade" value="handmade">
									<span>Handmade</span>
								</label>
								<label class="checkbox-label">
									<input type="checkbox" id="editProductBiodegradable" name="editProductBiodegradable" value="biodegradable">
									<span>Biodegradable</span>
								</label>
							</div>
						</div>
						
						<div class="form-actions">
							<button type="submit" form="editProductForm" class="btn btn-primary">Update Product</button>
							<button type="button" class="btn btn-secondary" id="cancelEditProduct">Cancel</button>
						</div>
					</form>
					
					<div class="profile-vertical-divider"></div>
					
					<div class="profile-image-section">
						<div class="product-image-preview-container">
							<div class="product-image-preview" id="editProductImagePreview">
								<img src="" alt="Product Image" id="editProductImageImg" style="display: none;">
								<div class="upload-placeholder" id="editUploadPlaceholder">
									<i class="bi bi-image"></i>
									<span>Upload Image</span>
								</div>
								<div class="upload-overlay" id="editUploadOverlay">
									<i class="bi bi-camera"></i>
									<span>Change Image</span>
								</div>
							</div>
							<input type="file" id="editProductImages" name="editProductImages" accept="image/*" multiple hidden>
							<p class="upload-hint">Max 5 images, 5MB each</p>
							<div class="product-images-grid" id="editProductImagesGrid" style="display: none;">
								<!-- Selected images will appear here -->
							</div>
						</div>
						
						<div class="description-group">
							<label for="editProductDescription">Product Description</label>
							<textarea id="editProductDescription" name="editProductDescription" form="editProductForm" class="profile-textarea" placeholder="Describe your product in detail..."></textarea>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script defer src="{{ url_for('static', filename='js/seller/seller_edit_products.js') }}"></script>
</body>
</html>
