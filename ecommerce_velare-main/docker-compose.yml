services:
  web:
    build: .
    container_name: velare-app
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded files across container restarts. The Dockerfile
      # pre-creates every required upload subdirectory so the empty host
      # mount won't shadow them with missing folders.
      - ./static/uploads:/app/static/uploads
    # Production runtime defaults. Secrets (SUPABASE_URL, SUPABASE_KEY,
    # SECRET_KEY, etc.) come from .env. We use ${VAR:-default} so .env can
    # still override these if needed without colliding silently.
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
      - PORT=${PORT:-5000}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - velare-network
    healthcheck:
      # python is always present in the image, curl is not. Using urllib avoids
      # adding an extra apt package just for the healthcheck.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  velare-network:
    driver: bridge
