<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="icon" type="image/png" sizes="64x64 32x32 16x16" href="{{ url_for('static', filename='images/velarelogo.png') }}">
	<meta charset="UTF-8">
	<title>Forgot Password</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/forgot_password.css') }}">
	
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
	<!-- Bootstrap Icons CDN -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<style>
		.error-message {
			color: #dc3545;
			font-size: 14px;
			margin-top: 10px;
			display: none;
		}
		.success-message {
			color: #28a745;
			font-size: 14px;
			margin-top: 10px;
			display: none;
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="image-section" id="imageSection">
			<!-- Dynamic product images will be loaded here -->
			<div class="loading-placeholder" style="display: flex; align-items: center; justify-content: center; height: 100%; color: #999;">
				<i class="bi bi-hourglass-split" style="font-size: 48px;"></i>
			</div>
		</div>
		<div class="form-section">
			<div class="tab-nav">
				<div class="tab-group">
					<div class="brand-logo">
						<img src="../static/images/velarelogo.png" alt="Brand Logo">
					</div>
					<h2 class="signin-title">Forgot Password</h2>
				</div>
			</div>
			<div class="welcome-message" id="welcomeMessage">
				<div class="welcome-sub">Enter your email address and we'll send you a code to reset your password.</div>
			</div>
			<form class="sign-in-form" id="forgotPasswordForm" method="POST">
				<input type="email" id="email" name="email" required autocomplete="off" placeholder="Email">
				
				<div class="error-message" id="errorMessage"></div>
				<div class="success-message" id="successMessage"></div>
				
				<button type="submit" class="sign-in-btn">Send Code</button>
				<div class="register-link" style="margin-top:18px;">
					<a href="{{ url_for('auth.login') }}">Back to Login</a>
				</div>
			</form>
		</div>
	</div>

	<script>
		document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
			e.preventDefault();
			
			const errorMessage = document.getElementById('errorMessage');
			const successMessage = document.getElementById('successMessage');
			const submitBtn = e.target.querySelector('button[type="submit"]');
			
			// Hide previous messages
			errorMessage.style.display = 'none';
			successMessage.style.display = 'none';
			
			// Disable submit button
			submitBtn.disabled = true;
			submitBtn.textContent = 'Sending...';
			
			const formData = new FormData(this);
			
			try {
				const response = await fetch('/forgot_password', {
					method: 'POST',
					body: formData
				});
				
				const data = await response.json();
				
				if (data.success) {
					successMessage.textContent = data.message;
					successMessage.style.display = 'block';
					
					// Redirect to reset password page
					if (data.redirect) {
						setTimeout(() => {
							window.location.href = data.redirect;
						}, 1500);
					}
				} else {
					errorMessage.textContent = data.message;
					errorMessage.style.display = 'block';
					submitBtn.disabled = false;
					submitBtn.textContent = 'Send Code';
				}
			} catch (error) {
				errorMessage.textContent = 'An error occurred. Please try again.';
				errorMessage.style.display = 'block';
				submitBtn.disabled = false;
				submitBtn.textContent = 'Send Code';
			}
		});

		// Dynamic image slideshow (same as login page)
		document.addEventListener('DOMContentLoaded', function() {
			const imageSection = document.getElementById('imageSection');
			
			fetch('/api/featured-products')
				.then(response => response.json())
				.then(data => {
					if (data.success && data.products && data.products.length > 0) {
						imageSection.innerHTML = '';
						
						data.products.forEach((product, index) => {
							const img = document.createElement('img');
							img.src = product.image_path;
							img.alt = product.product_name;
							img.className = 'slideshow-image';
							if (index === 0) {
								img.classList.add('active');
							}
							imageSection.appendChild(img);
						});
						
						// Start slideshow if more than one image
						if (data.products.length > 1) {
							let currentIndex = 0;
							const images = imageSection.querySelectorAll('.slideshow-image');
							
							setInterval(() => {
								images[currentIndex].classList.remove('active');
								currentIndex = (currentIndex + 1) % images.length;
								images[currentIndex].classList.add('active');
							}, 4000);
						}
					} else {
						// Fallback to default images
						loadFallbackImages();
					}
				})
				.catch(error => {
					console.error('Error loading images:', error);
					loadFallbackImages();
				});
			
			function loadFallbackImages() {
				const fallbackImages = [
					'/static/images/sampleimage1.jpg',
					'/static/images/sampleimage2.webp',
					'/static/images/sampleimage3.webp',
					'/static/images/sampleimage4.webp',
					'/static/images/sampleimage5.webp'
				];
				
				imageSection.innerHTML = '';
				fallbackImages.forEach((src, index) => {
					const img = document.createElement('img');
					img.src = src;
					img.alt = 'Fashion Image';
					img.className = 'slideshow-image';
					if (index === 0) {
						img.classList.add('active');
					}
					imageSection.appendChild(img);
				});
				
				// Start slideshow
				let currentIndex = 0;
				const images = imageSection.querySelectorAll('.slideshow-image');
				setInterval(() => {
					images[currentIndex].classList.remove('active');
					currentIndex = (currentIndex + 1) % images.length;
					images[currentIndex].classList.add('active');
				}, 4000);
			}
		});
	</script>
</body>
</html>
