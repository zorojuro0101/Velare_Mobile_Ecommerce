<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="icon" type="image/png" sizes="64x64 32x32 16x16" href="{{ url_for('static', filename='images/velarelogo.png') }}">
	<meta charset="UTF-8">
	<title>Reset Password</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}?v=4">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/forgot_password.css') }}?v=4">
	
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
	<!-- Bootstrap Icons CDN -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
	<div class="container">
		<div class="image-section" id="imageSection">
			<!-- Dynamic product images will be loaded here -->
			<div class="loading-placeholder" style="display: flex; align-items: center; justify-content: center; height: 100%; color: #999;">
				<i class="bi bi-hourglass-split" style="font-size: 48px;"></i>
			</div>
		</div>
		<div class="form-section">
			<div class="tab-nav">
				<div class="tab-group">
					<div class="brand-logo">
						<img src="../static/images/velarelogo.png" alt="Brand Logo">
					</div>
					<h2 class="signin-title">Reset Password</h2>
				</div>
			</div>
			<div class="welcome-message" id="welcomeMessage">
				<div class="welcome-sub">Enter the code sent to your email and your new password.</div>
			</div>
			<form class="sign-in-form" id="resetPasswordForm" method="POST">
				<input type="hidden" id="email" name="email" value="{{ email }}">
				<input type="text" id="reset_code" name="reset_code" required autocomplete="off" placeholder="6-Digit Reset Code" maxlength="6" pattern="\d{6}">
				<div class="password-input-wrapper">
					<input type="password" id="new_password" name="new_password" required autocomplete="off" placeholder="New Password">
					<button type="button" class="password-toggle" data-target="new_password" aria-pressed="false"><i class="bi bi-eye-slash"></i></button>
				</div>
				<div class="password-input-wrapper">
					<input type="password" id="confirm_password" name="confirm_password" required autocomplete="off" placeholder="Confirm New Password">
					<button type="button" class="password-toggle" data-target="confirm_password" aria-pressed="false"><i class="bi bi-eye-slash"></i></button>
				</div>
				
				<div class="password-requirements">
					<strong id="passwordRequirements">Password Requirements:</strong>
					<ul class="password-requirements-list">
						<li data-requirement="length">At least 6 characters long</li>
						<li data-requirement="uppercase">Contains at least one uppercase letter</li>
						<li data-requirement="lowercase">Contains at least one lowercase letter</li>
						<li data-requirement="number">Contains at least one number</li>
					</ul>
				</div>
				
				<div class="error-message" id="errorMessage"></div>
				<div class="success-message" id="successMessage"></div>
				
				<button type="submit" class="sign-in-btn">Reset Password</button>
				<div class="register-link" style="margin-top:18px;">
					<a href="{{ url_for('auth.login') }}">Back to Login</a>
				</div>
			</form>
		</div>
	</div>

	<script>
		// Dynamic image slideshow (same as login page) - LOAD FIRST
		document.addEventListener('DOMContentLoaded', function() {
			const imageSection = document.getElementById('imageSection');
			
			fetch('/api/featured-products')
				.then(response => response.json())
				.then(data => {
					if (data.success && data.products && data.products.length > 0) {
						imageSection.innerHTML = '';
						
						data.products.forEach((product, index) => {
							const img = document.createElement('img');
							img.src = product.image_path;
							img.alt = product.product_name;
							img.className = 'slideshow-image';
							if (index === 0) {
								img.classList.add('active');
							}
							imageSection.appendChild(img);
						});
						
						// Start slideshow if more than one image
						if (data.products.length > 1) {
							let currentIndex = 0;
							const images = imageSection.querySelectorAll('.slideshow-image');
							
							setInterval(() => {
								images[currentIndex].classList.remove('active');
								currentIndex = (currentIndex + 1) % images.length;
								images[currentIndex].classList.add('active');
							}, 4000);
						}
					} else {
						// Fallback to default images
						loadFallbackImages();
					}
				})
				.catch(error => {
					console.error('Error loading images:', error);
					loadFallbackImages();
				});
			
			function loadFallbackImages() {
				const fallbackImages = [
					'/static/images/sampleimage1.jpg',
					'/static/images/sampleimage2.webp',
					'/static/images/sampleimage3.webp',
					'/static/images/sampleimage4.webp',
					'/static/images/sampleimage5.webp'
				];
				
				imageSection.innerHTML = '';
				fallbackImages.forEach((src, index) => {
					const img = document.createElement('img');
					img.src = src;
					img.alt = 'Fashion Image';
					img.className = 'slideshow-image';
					if (index === 0) {
						img.classList.add('active');
					}
					imageSection.appendChild(img);
				});
				
				// Start slideshow
				let currentIndex = 0;
				const images = imageSection.querySelectorAll('.slideshow-image');
				setInterval(() => {
					images[currentIndex].classList.remove('active');
					currentIndex = (currentIndex + 1) % images.length;
					images[currentIndex].classList.add('active');
				}, 4000);
			}
		});

		// Password toggle functionality
		const passwordToggles = document.querySelectorAll('.password-toggle');
		passwordToggles.forEach(toggle => {
			const targetId = toggle.dataset.target;
			const targetInput = document.getElementById(targetId);

			if (!targetInput) {
				return;
			}

			const icon = toggle.querySelector('i');

			const syncState = () => {
				const isVisible = targetInput.type === 'text';
				if (icon) {
					icon.className = isVisible ? 'bi bi-eye' : 'bi bi-eye-slash';
				}
				toggle.setAttribute('aria-pressed', isVisible ? 'true' : 'false');
			};

			toggle.addEventListener('click', () => {
				const isPassword = targetInput.type === 'password';
				targetInput.type = isPassword ? 'text' : 'password';
				syncState();
			});

			syncState();
		});

		// Password requirements validation
		const newPasswordInput = document.getElementById('new_password');
		const requirementItems = document.querySelectorAll('.password-requirements-list li');
		let hasAttemptedSubmit = false;

		const requirementChecks = {
			length: password => password.length >= 6,
			uppercase: password => /[A-Z]/.test(password),
			lowercase: password => /[a-z]/.test(password),
			number: password => /\d/.test(password)
		};

		function updateRequirementStates(password, highlightUnmet = false) {
			requirementItems.forEach(item => {
				const requirement = item.dataset.requirement;
				if (requirement && requirementChecks[requirement]) {
					const isMet = requirementChecks[requirement](password);
					item.classList.toggle('met', isMet);
					if (isMet) {
						item.classList.remove('unmet');
					} else if (highlightUnmet) {
						// Remove and re-add class to restart animation
						item.classList.remove('unmet');
						// Force reflow to restart animation
						void item.offsetWidth;
						item.classList.add('unmet');
					} else {
						item.classList.remove('unmet');
					}
				}
			});
		}

		if (newPasswordInput) {
			newPasswordInput.addEventListener('input', event => {
				const value = event.target.value;
				updateRequirementStates(value, hasAttemptedSubmit);
			});

			// Initialize state on load
			updateRequirementStates(newPasswordInput.value || '');
		}

		// Form submission
		document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
			e.preventDefault();
			
			const errorMessage = document.getElementById('errorMessage');
			const successMessage = document.getElementById('successMessage');
			const submitBtn = e.target.querySelector('button[type="submit"]');
			
			// Hide previous messages
			errorMessage.style.display = 'none';
			successMessage.style.display = 'none';

			// Validate password requirements
			hasAttemptedSubmit = true;
			updateRequirementStates(newPasswordInput.value, true);

			const hasUnmetRequirements = Array.from(requirementItems).some(item => !item.classList.contains('met'));
			if (hasUnmetRequirements) {
				newPasswordInput.focus();
				errorMessage.textContent = 'Please meet all password requirements';
				errorMessage.style.display = 'block';
				return;
			}
			
			// Disable submit button
			submitBtn.disabled = true;
			submitBtn.textContent = 'Resetting...';
			
			const formData = new FormData(this);
			
			try {
				const response = await fetch('/reset_password', {
					method: 'POST',
					body: formData
				});
				
				const data = await response.json();
				
				if (data.success) {
					successMessage.textContent = data.message;
					successMessage.style.display = 'block';
					
					// Redirect after 2 seconds
					setTimeout(() => {
						window.location.href = data.redirect;
					}, 2000);
				} else {
					errorMessage.textContent = data.message;
					errorMessage.style.display = 'block';
					submitBtn.disabled = false;
					submitBtn.textContent = 'Reset Password';
				}
			} catch (error) {
				errorMessage.textContent = 'An error occurred. Please try again.';
				errorMessage.style.display = 'block';
				submitBtn.disabled = false;
				submitBtn.textContent = 'Reset Password';
			}
		});

		// Only allow digits in reset code field
		document.getElementById('reset_code').addEventListener('input', function(e) {
			this.value = this.value.replace(/\D/g, '');
		});
	</script>
</body>
</html>
